name: Build Native Android APKs

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: Build variant
        required: true
        default: debug
        type: choice
        options:
          - debug
          - release
  push:
    paths:
      - 'android-native/**'
      - '.github/workflows/android-native.yml'
  pull_request:
    paths:
      - 'android-native/**'
      - '.github/workflows/android-native.yml'

permissions:
  contents: read

jobs:
  build-native:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    defaults:
      run:
        working-directory: android-native

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.14.3

      - name: Build debug APKs
        if: ${{ github.event.inputs.build_type != 'release' }}
        run: gradle :app-admin:assembleDebug :app-driver:assembleDebug --stacktrace --no-daemon

      - name: Build release APKs
        if: ${{ github.event.inputs.build_type == 'release' }}
        env:
          FLOTA_RELEASE_STORE_FILE: ${{ secrets.FLOTA_RELEASE_STORE_FILE }}
          FLOTA_RELEASE_STORE_PASSWORD: ${{ secrets.FLOTA_RELEASE_STORE_PASSWORD }}
          FLOTA_RELEASE_KEY_ALIAS: ${{ secrets.FLOTA_RELEASE_KEY_ALIAS }}
          FLOTA_RELEASE_KEY_PASSWORD: ${{ secrets.FLOTA_RELEASE_KEY_PASSWORD }}
        run: gradle :app-admin:assembleRelease :app-driver:assembleRelease --stacktrace --no-daemon

      - name: Upload admin APKs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-admin-apk-${{ github.event.inputs.build_type || 'debug' }}
          path: android-native/app-admin/build/outputs/apk/**/*.apk
          if-no-files-found: warn

      - name: Upload driver APKs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-driver-apk-${{ github.event.inputs.build_type || 'debug' }}
          path: android-native/app-driver/build/outputs/apk/**/*.apk
          if-no-files-found: warn
