name: Build Native Android APKs

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: Build variant
        required: true
        default: debug
        type: choice
        options:
          - debug
          - release
      persist_problem_report:
        description: Commit latest Gradle problem report to repository (only on failure)
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    paths:
      - 'android-native/**'
      - '.github/workflows/android-native.yml'
  pull_request:
    paths:
      - 'android-native/**'
      - '.github/workflows/android-native.yml'

permissions:
  contents: write

jobs:
  build-native:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    defaults:
      run:
        working-directory: android-native

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.14.3

      - name: Build debug APKs
        if: ${{ github.event.inputs.build_type != 'release' }}
        run: gradle clean :app-admin:assembleDebug :app-driver:assembleDebug --stacktrace --no-daemon --console=plain

      - name: Build release APKs
        if: ${{ github.event.inputs.build_type == 'release' }}
        env:
          FLOTA_RELEASE_STORE_FILE: ${{ secrets.FLOTA_RELEASE_STORE_FILE }}
          FLOTA_RELEASE_STORE_PASSWORD: ${{ secrets.FLOTA_RELEASE_STORE_PASSWORD }}
          FLOTA_RELEASE_KEY_ALIAS: ${{ secrets.FLOTA_RELEASE_KEY_ALIAS }}
          FLOTA_RELEASE_KEY_PASSWORD: ${{ secrets.FLOTA_RELEASE_KEY_PASSWORD }}
        run: gradle clean :app-admin:assembleRelease :app-driver:assembleRelease --stacktrace --no-daemon --console=plain

      - name: Upload admin APKs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-admin-apk-${{ github.event.inputs.build_type || 'debug' }}
          path: android-native/app-admin/build/outputs/apk/**/*.apk
          if-no-files-found: warn

      - name: Upload driver APKs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-driver-apk-${{ github.event.inputs.build_type || 'debug' }}
          path: android-native/app-driver/build/outputs/apk/**/*.apk
          if-no-files-found: warn

      - name: Upload Gradle problem reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: native-gradle-problem-reports
          path: |
            android-native/build/reports/problems/**
            android-native/**/build/reports/**
          if-no-files-found: warn

      - name: Persist latest problem report in repository
        if: ${{ failure() && github.event_name == 'workflow_dispatch' && github.event.inputs.persist_problem_report == 'true' }}
        working-directory: .
        run: |
          set -euo pipefail
          REPORT_DIR="android-native/build/reports/problems"
          REPORT_FILE="$REPORT_DIR/problems-report.html"
          if [[ ! -f "$REPORT_FILE" ]]; then
            echo "No $REPORT_FILE found, skipping commit."
            exit 0
          fi

          TARGET_DIR="android-native/docs/ci-problems/latest"
          mkdir -p "$TARGET_DIR"
          cp "$REPORT_FILE" "$TARGET_DIR/problems-report.html"

          cat > "$TARGET_DIR/README.md" <<EOF
          # Latest native build problems report

          - Generated by workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          - Workflow: \`${{ github.workflow }}\`
          - Build type: \`${{ github.event.inputs.build_type }}\`
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$TARGET_DIR/problems-report.html" "$TARGET_DIR/README.md"
          if git diff --staged --quiet; then
            echo "Problem report unchanged; nothing to commit."
            exit 0
          fi
          git commit -m "ci(native): update latest problems report (run ${{ github.run_id }})"
          git push
